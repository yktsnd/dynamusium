name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (created on the current commit if it does not exist)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run work:validate
      - run: npm run build
        env:
          DYNAMUSIUM_BASE: /${{ github.event.repository.name }}/
      - name: Package build output
        run: tar -czf "dynamusium-${RELEASE_TAG}.tar.gz" -C dist .
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DynaMusium ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dynamusium-${{ env.RELEASE_TAG }}.tar.gz
          body: |
            **DynaMusium — Museum of Dynamic Systems**

            Explore thirty sourced, deterministic, interactive works across motion and chaos,
            matter and pattern, life and reaction, Earth and climate, and cosmos and gravity.
            Every room connects a computed trajectory or field to live controls, synchronized
            traces, curator context, equations, citations, and an accessible data table.

            **Live museum:** https://yktsnd.github.io/dynamusium/
