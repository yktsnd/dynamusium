name: Feature request
description: Propose an enhancement to KinetiFlux.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve, or what is currently missing/awkward?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or workarounds you've thought about.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        **Scope note:** the current version of KinetiFlux deliberately excludes a
        graphical model editor and npm package publishing. Requests in these areas
        may be closed as out of scope unless there is a concrete, narrowly-scoped
        proposal.
